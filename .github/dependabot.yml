# Dependabot config — opened by S39 TASK-3903 (2026-05-23)
#
# 4 ecosystems active: nuget, npm, github-actions, docker.
# Staggered cron to avoid initial PR firehose:
#   - nuget on Mondays (largest blast radius — front-loads triage)
#   - npm + docker + github-actions on Thursdays
# Manual review only this sprint; no auto-merge configured.
# Auto-merge policy decision deferred to a follow-up sprint after the
# first month of PR volume settles.

version: 2
updates:
  # --- .NET / nuget ---
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "deps(nuget)"

  # --- Frontend / npm ---
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "thursday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(npm)"

  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"

  # --- Docker (docker-compose + mock service dockerfiles) ---
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "thursday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"

  # --- Docker (production service dockerfiles) ---
