name: StatsTid CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lizard:
    name: Cyclomatic complexity report (lizard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lizard via pipx
        run: pipx install lizard

      - name: Run lizard on production C# (report-only, threshold 15)
        # S39 TASK-3912: report-only baseline. Threshold 15 chosen because the Rule Engine
        # has legitimate switch-over-enum patterns that exceed CCN 10 per ADR-002 purity.
        # `--warnings_only` prints only methods exceeding the threshold; exit code is 0 even
        # when warnings are emitted (controlled by absence of -W).  We DO NOT pass `--CCN 15
        # -W` (which exits non-zero) — gating-vs-baseline decision deferred to post-launch.
        run: |
          set +e
          lizard src/ -l cs -C 15 --warnings_only | tee lizard-report.txt
          echo "Lizard complexity scan complete (report-only; exit code ignored)."
          exit 0

      - name: Upload lizard report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lizard-ccn-report
          path: lizard-report.txt

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history for `detect` mode

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.18.4
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -O gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repo for secrets
        run: gitleaks detect --config .gitleaks.toml --no-banner --verbose --redact

  build-and-test:
    runs-on: ubuntu-latest
    # S64 / TASK-6405: services-postgres for the regression step. The compose-coupled
    # regression classes (ReportingLine et al.) connect to a fixed localhost:5432 —
    # locally that's the docker-compose postgres; in CI this service container plays
    # that role (image + env triple mirror docker/docker-compose.yml:9-14 exactly).
    # Without it the regression step structurally could not pass (S64 Step-0b/refinement
    # cycle-1 Codex BLOCKER). Testcontainers-based classes are unaffected (they
    # self-provision postgres on random host ports via the runner's Docker daemon).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: statstid
          POSTGRES_USER: statstid
          POSTGRES_PASSWORD: statstid_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U statstid -d statstid"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
        with:
          # S64 fix-forward: BugCorrectionHistorySchemaTests resolves commit SHAs from
          # the bug-correction history against git (`<sha>^{commit}`); the default
          # shallow clone cannot resolve them (passed locally, failed only in CI).
          # Same full-history pattern as the docs-consistency + gitleaks jobs.
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore StatsTid.sln

      - name: Check for vulnerable packages (High/Critical = fail; Low/Moderate = warn)
        run: |
          set +e
          output=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -qE '\s(High|Critical)\s+https://'; then
            echo "::error::High or Critical severity CVE detected — see log above"
            exit 1
          fi
          if echo "$output" | grep -qE '\s(Low|Moderate)\s+https://'; then
            echo "::warning::Low or Moderate severity CVE detected (logged, not failing)"
          fi

      - name: Build
        run: dotnet build StatsTid.sln --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/StatsTid.Tests.Unit --no-build -c Release --logger "trx"

      - name: Apply init.sql to the services-postgres (schema + seeds for the :5432-coupled classes)
        # S64 / TASK-6405: the compose-coupled classes read init.sql-seeded state (orgs,
        # reporting-line rows, entitlement configs). psql ships on the ubuntu-latest
        # runner image. ON_ERROR_STOP makes schema drift fail loudly here, not as
        # mysterious downstream test failures.
        env:
          PGPASSWORD: statstid_dev
        run: psql "host=localhost port=5432 dbname=statstid user=statstid" -v ON_ERROR_STOP=1 -q -f docker/postgres/init.sql

      - name: Run regression tests
        run: dotnet test tests/StatsTid.Tests.Regression --no-build -c Release --logger "trx"

      - name: Collect coverage (baseline-recording only — no ≥X% gate this sprint)
        run: |
          dotnet test tests/StatsTid.Tests.Unit \
            --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory TestResults/Coverage
        continue-on-error: true  # coverage failure must not fail the build during baseline window

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-cobertura
          path: 'TestResults/Coverage/**/coverage.cobertura.xml'

  smoke-tests:
    name: Smoke tests (docker-compose harness)
    runs-on: ubuntu-latest
    # S63 post-close: `needs: build-and-test` REMOVED deliberately. The job is fully
    # self-contained (own checkout + own compose build); the dependency was pure
    # sequencing — and it cost us the smoke signal entirely: with the regression step
    # red on every master push >= S57, this job was perpetually SKIPPED, so the stale
    # smoke assertion (RegisterAndRetrieveTimeEntry 403-vs-201) went undetected for
    # weeks. Independent jobs = one red cannot blind another.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Bring up docker compose stack
        working-directory: docker
        # NOTE: --wait OMITTED intentionally. Container healthchecks at docker-compose.yml:43-162
        # all invoke `curl` inside containers built from mcr.microsoft.com/dotnet/aspnet:8.0,
        # which does NOT ship curl. Compose healthchecks therefore report unhealthy permanently
        # even though the apps respond fine from the host. --wait would block until per-service
        # start_period + (interval × retries) budget expires, then fail. The host-side loop below
        # is the actual wait gate. Fixing container-side healthchecks (curl install in 7 Dockerfiles)
        # is a separate Phase 4e candidate; out of scope for S39.
        run: docker compose up -d --build

      - name: Wait for service health (host-side loop — compose healthchecks are broken; see above)
        run: |
          for port in 5100 5200 5300 5400 5500 5600 5700; do
            echo "Waiting for http://localhost:$port/health ..."
            timeout 90 bash -c "until curl -sf http://localhost:$port/health > /dev/null; do sleep 2; done" || {
              echo "::error::Port $port did not respond within 90s"
              exit 1
            }
          done
          echo "All 7 .NET services healthy."

      - name: Run smoke tests
        run: dotnet test tests/StatsTid.Tests.Smoke --logger "trx" --results-directory TestResults/Smoke

      - name: Capture container logs on failure
        if: failure()
        working-directory: docker
        run: docker compose logs --no-color > ../smoke-failure-logs.txt

      - name: Upload smoke logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-logs
          path: smoke-failure-logs.txt

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: 'TestResults/Smoke/*.trx'

      - name: Tear down docker compose stack
        if: always()
        working-directory: docker
        run: docker compose down -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run vitest
        run: npm run test
        working-directory: frontend

  docs-consistency:
    name: Documentation consistency (check_docs.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # sprint-inventory check needs full git history

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run doc-consistency gate
        # Hard-fails on: db-schema.md drift vs init.sql, KB INDEX orphans/dangling links,
        # and sprints that shipped in git with no SPRINT-<n>.md log. Freshness is report-only.
        # See tools/check_docs.py and the 2026-05-31 doc-health reconciliation.
        run: python tools/check_docs.py
