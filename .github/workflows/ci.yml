name: StatsTid CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore StatsTid.sln

      - name: Build
        run: dotnet build StatsTid.sln --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/StatsTid.Tests.Unit --no-build -c Release --logger "trx"

      - name: Run regression tests
        run: dotnet test tests/StatsTid.Tests.Regression --no-build -c Release --logger "trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
