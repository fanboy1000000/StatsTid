name: StatsTid CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history for `detect` mode

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.18.4
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -O gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repo for secrets
        run: gitleaks detect --config .gitleaks.toml --no-banner --verbose --redact

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore StatsTid.sln

      - name: Check for vulnerable packages (High/Critical = fail; Low/Moderate = warn)
        run: |
          set +e
          output=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -qE '\s(High|Critical)\s+https://'; then
            echo "::error::High or Critical severity CVE detected — see log above"
            exit 1
          fi
          if echo "$output" | grep -qE '\s(Low|Moderate)\s+https://'; then
            echo "::warning::Low or Moderate severity CVE detected (logged, not failing)"
          fi

      - name: Build
        run: dotnet build StatsTid.sln --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/StatsTid.Tests.Unit --no-build -c Release --logger "trx"

      - name: Run regression tests
        run: dotnet test tests/StatsTid.Tests.Regression --no-build -c Release --logger "trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  smoke-tests:
    name: Smoke tests (docker-compose harness)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Bring up docker compose stack
        working-directory: docker
        # NOTE: --wait OMITTED intentionally. Container healthchecks at docker-compose.yml:43-162
        # all invoke `curl` inside containers built from mcr.microsoft.com/dotnet/aspnet:8.0,
        # which does NOT ship curl. Compose healthchecks therefore report unhealthy permanently
        # even though the apps respond fine from the host. --wait would block until per-service
        # start_period + (interval × retries) budget expires, then fail. The host-side loop below
        # is the actual wait gate. Fixing container-side healthchecks (curl install in 7 Dockerfiles)
        # is a separate Phase 4e candidate; out of scope for S39.
        run: docker compose up -d --build

      - name: Wait for service health (host-side loop — compose healthchecks are broken; see above)
        run: |
          for port in 5100 5200 5300 5400 5500 5600 5700; do
            echo "Waiting for http://localhost:$port/health ..."
            timeout 90 bash -c "until curl -sf http://localhost:$port/health > /dev/null; do sleep 2; done" || {
              echo "::error::Port $port did not respond within 90s"
              exit 1
            }
          done
          echo "All 7 .NET services healthy."

      - name: Run smoke tests
        run: dotnet test tests/StatsTid.Tests.Smoke --logger "trx" --results-directory TestResults/Smoke

      - name: Capture container logs on failure
        if: failure()
        working-directory: docker
        run: docker compose logs --no-color > ../smoke-failure-logs.txt

      - name: Upload smoke logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-logs
          path: smoke-failure-logs.txt

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: 'TestResults/Smoke/*.trx'

      - name: Tear down docker compose stack
        if: always()
        working-directory: docker
        run: docker compose down -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
